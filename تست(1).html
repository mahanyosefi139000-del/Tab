<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>ویدوکس | هوش مصنوعی</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg: #0f0f13;
            --sidebar-bg: #18181b;
            --card-bg: #1f1f24;
            --border: #2a2a30;
            --text: #eef2ff;
            --text-soft: #8b8b9e;
            --user-bg: #2a2a35;
            --user-text: #eef2ff;
            --ai-bg: #1f1f24;
            --ai-text: #eef2ff;
            --accent: #10a37f;
            --input-bg: #2a2a30;
            --code-bg: #0f0f13;
            --hover: #2a2a30;
            --shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        body.light {
            --bg: #f7f7f8;
            --sidebar-bg: #f9f9f9;
            --card-bg: #ffffff;
            --border: #e5e5e5;
            --text: #1f1f1f;
            --text-soft: #6c6c6c;
            --user-bg: #e9ecef;
            --user-text: #1f1f1f;
            --ai-bg: #ffffff;
            --ai-text: #1f1f1f;
            --accent: #10a37f;
            --input-bg: #ffffff;
            --code-bg: #f4f4f5;
            --hover: #f1f1f1;
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
        }

        body {
            background: var(--bg);
            color: var(--text);
            transition: all 0.2s;
            height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 100%;
            font-family: 'Inter', system-ui, 'Segoe UI', 'Google Sans', sans-serif;
        }

        .app { display: flex; height: 100%; width: 100%; position: relative; }

        /* سایدبار */
        .sidebar {
            position: fixed;
            right: -300px;
            top: 0;
            width: 300px;
            height: 100%;
            background: var(--sidebar-bg);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: right 0.25s ease;
            z-index: 200;
            box-shadow: -4px 0 20px rgba(0,0,0,0.4);
        }
        .sidebar.open { right: 0; }
        .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); }
        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            background: var(--card-bg);
            padding: 12px;
            border-radius: 32px;
            border: 1px solid var(--border);
        }
        .user-avatar {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #10a37f, #1a7f64);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            background-size: cover;
            background-position: center;
        }
        .user-info { flex: 1; }
        .user-name { font-weight: 600; font-size: 1rem; }
        .edit-name { font-size: 0.7rem; color: var(--text-soft); cursor: pointer; }
        .new-chat-sidebar {
            background: var(--accent);
            border: none;
            color: white;
            padding: 12px;
            border-radius: 40px;
            width: 100%;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
        }
        .chats-list { flex: 1; overflow-y: auto; padding: 0 12px; }
        .chat-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            border-radius: 16px;
            margin-bottom: 6px;
            cursor: pointer;
            transition: 0.1s;
        }
        .chat-item:hover { background: var(--hover); }
        .chat-item.active { background: var(--accent); color: white; }
        .chat-title {
            flex: 1;
            font-size: 0.85rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .chat-actions {
            display: flex;
            gap: 8px;
            opacity: 0;
        }
        .chat-item:hover .chat-actions { opacity: 1; }
        .chat-actions button {
            background: none;
            border: none;
            color: var(--text-soft);
            cursor: pointer;
            font-size: 1rem;
        }
        .sidebar-footer { padding: 20px; border-top: 1px solid var(--border); }
        .sidebar-footer .btn {
            background: none;
            border: none;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            padding: 10px;
            border-radius: 40px;
            cursor: pointer;
            margin-bottom: 8px;
        }
        .sidebar-footer .btn:hover { background: var(--hover); }

        /* بخش اصلی */
        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg);
            width: 100%;
            height: 100%;
        }

        /* هدر */
        .chat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .menu-icon {
            background: none;
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
            cursor: pointer;
        }
        .menu-icon span {
            display: block;
            width: 18px;
            height: 2px;
            background: var(--text);
            border-radius: 2px;
        }
        .menu-icon span:nth-child(2) { width: 12px; align-self: flex-start; }
        .top-actions {
            display: flex;
            align-items: center;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 29px;
            padding: 0 6px;
            height: 58px;
        }
        .top-btn {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 50%;
            color: var(--text);
        }
        .top-btn:hover { background: var(--hover); }
        .top-divider { width: 1px; height: 28px; background: var(--border); }

        /* پیام‌ها */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .message-row {
            display: flex;
            width: 100%;
            animation: fadeInUp 0.2s ease;
            flex-direction: column;
        }
        .user-row { align-items: flex-end; }
        .ai-row { align-items: flex-start; }
        .bubble {
            max-width: 80%;
            padding: 10px 16px;
            border-radius: 26px;
            line-height: 1.5;
            font-size: 0.95rem;
            position: relative;
        }
        .user-bubble {
            background: var(--user-bg);
            color: var(--user-text);
            border-bottom-left-radius: 6px;
        }
        .ai-bubble {
            background: var(--ai-bg);
            border: 1px solid var(--border);
            border-bottom-right-radius: 6px;
        }
        .message-footer {
            display: flex;
            gap: 12px;
            margin-top: 8px;
            opacity: 0;
            transition: opacity 0.1s;
        }
        .message-row:hover .message-footer { opacity: 1; }
        .footer-action {
            background: none;
            border: none;
            font-size: 0.7rem;
            color: var(--text-soft);
            padding: 4px 8px;
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
        }
        .footer-action:hover { background: var(--hover); color: var(--text); }

        /* تبلیغ */
        .ad-container {
            margin-top: 8px;
            width: 100%;
        }
        .ad-bubble {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 8px 12px;
            text-align: center;
            font-size: 0.8rem;
            display: inline-block;
            width: auto;
            max-width: 90%;
        }
        .ad-bubble a {
            text-decoration: none;
            font-weight: bold;
        }

        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 10px 16px;
        }
        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        @keyframes typing {
            0%,60%,100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-8px); opacity: 1; }
        }

        /* منوی نگه داشتن */
        .context-menu {
            position: fixed;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 8px;
            z-index: 1000;
            box-shadow: var(--shadow);
            min-width: 180px;
        }
        .context-item {
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            border-radius: 10px;
            font-size: 0.85rem;
        }
        .context-item:hover { background: var(--hover); }

        /* منوی سه نقطه */
        .settings-menu {
            display: none;
            position: fixed;
            top: 80px;
            right: 16px;
            width: 280px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            box-shadow: var(--shadow);
            z-index: 1000;
            overflow: hidden;
        }
        .settings-menu-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 18px;
            cursor: pointer;
            transition: 0.1s;
            font-size: 0.9rem;
            border-bottom: 1px solid var(--border);
        }
        .settings-menu-item:last-child { border-bottom: none; }
        .settings-menu-item:hover { background: var(--hover); }
        .settings-menu-item .material-icons { font-size: 1.2rem; color: var(--accent); }

        /* ورودی */
        .input-container {
            padding: 16px;
            background: var(--bg);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }
        .input-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 8px 16px;
        }
        .input-wrapper textarea {
            flex: 1;
            background: none;
            border: none;
            color: var(--text);
            font-size: 0.95rem;
            outline: none;
            resize: none;
            font-family: inherit;
            max-height: 120px;
            padding: 8px 0;
        }
        .send-btn {
            background: var(--accent);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* مودال تنظیمات */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .modal-card {
            background: var(--card-bg);
            border-radius: 32px;
            padding: 24px;
            width: 90%;
            max-width: 420px;
            text-align: center;
            border: 1px solid var(--border);
        }
        .modal-card input, .modal-card select {
            width: 100%;
            padding: 12px;
            margin: 12px 0;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 40px;
            color: var(--text);
        }
        .setting-group { text-align: right; margin: 16px 0; }
        .setting-group label { display: block; margin-bottom: 6px; font-size: 0.85rem; color: var(--text-soft); }
        .modal-buttons { display: flex; gap: 12px; justify-content: center; margin-top: 20px; }
        .toast {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent);
            color: white;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.8rem;
            z-index: 3000;
            animation: fadeOut 2s forwards;
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            padding: 20px;
        }
        .wolf-logo-large {
            font-size: 5rem;
            margin-bottom: 16px;
            filter: drop-shadow(0 0 10px rgba(16, 163, 127, 0.5));
            animation: howl 2s ease infinite;
        }
        @keyframes howl { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        .welcome-title {
            font-size: 1.8rem;
            font-weight: 600;
            background: linear-gradient(135deg, #10a37f, #8b5cf6);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .welcome-sub { margin: 12px 0 24px; color: var(--text-soft); }
        .suggestion-cards {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-top: 20px;
        }
        .suggestion-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 10px 20px;
            cursor: pointer;
            transition: 0.1s;
        }
        .suggestion-card:hover { background: var(--hover); }
    </style>
</head>

</div>

<div class="settings-menu" id="settingsMenu">

    <div class="settings-menu-item" id="menuTheme"><span class="material-icons">dark_mode</span> <span data-i18n="theme">تغییر تم</span></div>
    <div class="settings-menu-item" id="menuLanguage"><span class="material-icons">language</span> <span data-i18n="language">تغییر زبان</span></div>
    <div class="settings-menu-item" id="menuRubika"><span class="material-icons">link</span> <span data-i18n="rubika">کانال روبیکا</span></div>
    <div class="settings-menu-item" id="menuTelegram"><span class="material-icons">telegram</span> <span data-i18n="telegram">کانال تلگرام</span></div>
    <div class="settings-menu-item" id="menuHome"><span class="material-icons">home</span> <span data-i18n="home">صفحه اصلی</span></div>
</div>

<div id="advancedSettingsModal" class="modal">
    <div class="modal-card">
        <h3 data-i18n="advanced_settings">تنظیمات پیشرفته</h3>
        <div class="setting-group"><label data-i18n="username">نام کاربر</label><input type="text" id="userNameInput" placeholder="نام شما"></div>
        <div class="setting-group"><label data-i18n="personality">علایق و شخصیت</label><input type="text" id="personalityInput" placeholder="مثال: برنامه‌نویس، دانشجو"></div>
        <div class="setting-group"><label data-i18n="language_select">زبان برنامه</label>
            <select id="languageSelect">
                <option value="fa">فارسی</option>
                <option value="en">English</option>
                <option value="ar">العربية</option>
                <option value="zh">中文</option>
            </select>
        </div>
        <div class="modal-buttons">
            <button id="saveAdvancedSettings" style="background:var(--accent); color:white;"><span data-i18n="save">ذخیره</span></button>
            <button id="closeAdvancedModal" style="background:var(--border); color:var(--text);"><span data-i18n="close">بستن</span></button>
        </div>
    </div>
</div>

            new_chat: "新对话", settings: "设置", delete_all: "删除所有对话", edit_profile: "编辑",
            welcome_title: "Vidox AI", welcome_sub: "今天我能帮你什么？",
            suggest1: "构建Telegram机器人", suggest2: "Python教程", suggest3: "网页设计",
            typing: "正在输入...", copy: "复制", select: "选择文本", share: "分享", edit: "编辑", copied: "已复制", saved: "设置已保存",
            error: "连接错误", back_to_home: "返回主页"
        }
    };
    let currentLang = "fa";
    function updateUILanguage() {
        const t = translations[currentLang];
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if(t[key]) el.innerText = t[key];
        });
        document.getElementById('messageInput').placeholder = currentLang === "fa" ? "پیام خود را بنویسید..." : (currentLang === "en" ? "Type your message..." : (currentLang === "ar" ? "اكتب رسالتك..." : "输入您的消息..."));
        const ws = document.querySelector('.welcome-screen');
        if(ws) {
            const title = ws.querySelector('.welcome-title');
            const sub = ws.querySelector('.welcome-sub');
            if(title) title.innerText = t.welcome_title;
            if(sub) sub.innerText = t.welcome_sub;
            const cards = ws.querySelectorAll('.suggestion-card');
            if(cards[0]) cards[0].innerHTML = `🤖 ${t.suggest1}`;
            if(cards[1]) cards[1].innerHTML = `🐍 ${t.suggest2}`;
            if(cards[2]) cards[2].innerHTML = `🌐 ${t.suggest3}`;
        }
    }

    // ========== API ==========
    const API_KEY = "sk-4NLbvHXJrYqRKKb4gxNFIHppAkZ91W5OZc0AFYchKEgqLL9w";
    const API_URL = "https://api.gapgpt.app/v1/chat/completions";
    const MODEL = "gapgpt-qwen-3.5";

    // ========== تبلیغات ==========
    const ADS_URL = "https://raw.githubusercontent.com/mahanyosefi139000-del/Tab/main/%D8%AA%D8%A8%D9%84%DB%8C%D8%BA%D8%A7%D8%AA(1).json";
    let currentAd = null;
    async function fetchAd() {
        try {
            const res = await fetch(ADS_URL + "?t=" + Date.now());
            const data = await res.json();
            if(data.ads && data.ads.length) currentAd = data.ads[Math.floor(Math.random()*data.ads.length)];
        } catch(e) {}
    }
    function displayAdUnderMessage(msgId) {
        if(!currentAd) return;
        const msgEl = document.querySelector(`.message-row[data-msg-idx="${msgId}"]`);
        if(!msgEl) return;
        const old = msgEl.querySelector('.ad-container');
        if(old) old.remove();
        const adDiv = document.createElement('div');
        adDiv.className = 'ad-container';
        adDiv.innerHTML = `<div class="ad-bubble" style="background:${currentAd.color}20; border-color:${currentAd.color};"><a href="${currentAd.link}" target="_blank" style="color:${currentAd.color};">${currentAd.emoji||'📢'} ${currentAd.text}</a></div>`;
        msgEl.appendChild(adDiv);
    }

    // ========== مدیریت چت ==========
    let chats = [], currentChatId = null, isLoading = false;
    let userName = localStorage.getItem("vidox_userName") || "ماهان";
    let userPersonality = localStorage.getItem("vidox_personality") || "";
    let userLanguage = localStorage.getItem("vidox_language") || "fa";
    let isDark = localStorage.getItem("vidox_theme") !== "light";

    function saveChats() { localStorage.setItem("vidox_chats", JSON.stringify(chats)); renderChatList(); }
    function renderChatList() {
        const container = document.getElementById("chatsListSidebar");
        if(!container) return;
        container.innerHTML = chats.map(chat => `
            <div class="chat-item ${currentChatId === chat.id ? 'active' : ''}" data-id="${chat.id}">
                <div class="chat-title">${escapeHtml(chat.title)}</div>
                <div class="chat-actions">
                    <button class="rename-chat" data-id="${chat.id}"><span class="material-icons">edit</span></button>
                    <button class="delete-chat" data-id="${chat.id}"><span class="material-icons">delete</span></button>
                </div>
            </div>
        `).join("");
        document.querySelectorAll(".chat-item").forEach(el => {
            el.addEventListener("click", (e) => {
                if(e.target.closest(".rename-chat")||e.target.closest(".delete-chat")) return;
                const id = parseInt(el.dataset.id);
                if(!isNaN(id)) switchChat(id);
            });
        });
        document.querySelectorAll(".rename-chat").forEach(btn => btn.addEventListener("click", (e) => { e.stopPropagation(); const id = parseInt(btn.dataset.id); renameChat(id); }));
        document.querySelectorAll(".delete-chat").forEach(btn => btn.addEventListener("click", (e) => { e.stopPropagation(); const id = parseInt(btn.dataset.id); deleteChat(id); }));
    }
    function renameChat(id) {
        const chat = chats.find(c => c.id === id);
        if(!chat) return;
        let newName = prompt(translations[currentLang].edit, chat.title);
        if(newName && newName.trim()) { chat.title = newName.trim(); saveChats(); showToast(translations[currentLang].saved); }
    }
    function deleteChat(id) {
        if(chats.length === 1) { showToast("حداقل یک چت باید باقی بماند"); return; }
        chats = chats.filter(c => c.id !== id);
        if(currentChatId === id) currentChatId = chats[0].id;
        saveChats(); renderCurrentChat(); showToast("چت حذف شد");
    }
    function deleteAllChats() {
        if(chats.length <= 1) { showToast("چت جدیدی برای حذف وجود ندارد"); return; }
        if(confirm(translations[currentLang].delete_all)) {
            let first = chats[0];
            chats = [first];
            first.title = "چت جدید";
            first.messages = [];
            currentChatId = first.id;
            saveChats(); renderCurrentChat(); showToast(translations[currentLang].delete_all);
        }
    }
    function switchChat(id) { currentChatId = id; renderChatList(); renderCurrentChat(); }
    function createNewChat() {
        let newChat = { id: Date.now(), title: "چت جدید", messages: [] };
        chats.unshift(newChat);
        currentChatId = newChat.id;
        saveChats(); renderCurrentChat(); showToast(translations[currentLang].new_chat);
    }
    function updateChatTitle() {
        let chat = chats.find(c => c.id === currentChatId);
        if(chat && chat.title === "چت جدید" && chat.messages.length > 0) {
            let first = chat.messages.find(m => m.role === 'user')?.content;
            if(first) chat.title = first.substring(0,25)+(first.length>25?"…":"");
            saveChats();
        }
    }
    function formatMessage(content) {
        if(!content) return "";
        return content.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\*(.*?)\*/g,'<em>$1</em>').replace(/```(.*?)```/gs, match => {
            let code = match.slice(3,-3);
            return `<div style="position:relative; background:var(--code-bg); border-radius:12px; margin:8px 0; padding:12px;"><pre style="margin:0; overflow-x:auto;"><code class="language-plaintext">${escapeHtml(code)}</code></pre><button class="copy-code-btn" style="position:absolute; top:8px; right:8px; background:var(--accent); border:none; border-radius:8px; padding:4px 8px; color:white; cursor:pointer; font-size:0.7rem;">📋 ${translations[currentLang].copy}</button></div>`;
        }).replace(/`(.*?)`/g,'<code>$1</code>').replace(/\n/g,'<br>').replace(/(https?:\/\/[^\s]+)/g,'<a href="$1" target="_blank" style="color:#10a37f">$1</a>');
    }
    function renderCurrentChat() {
        let chat = chats.find(c => c.id === currentChatId);
        let container = document.getElementById("messagesArea");
        if(!chat || !container) return;
        if(chat.messages.length === 0) {
            container.innerHTML = `
                <div class="welcome-screen">
                    <div class="wolf-logo-large">🐺</div>
                    <div class="welcome-title">${translations[currentLang].welcome_title}</div>
                    <div class="welcome-sub">${translations[currentLang].welcome_sub}</div>
                    <div class="suggestion-cards">
                        <div class="suggestion-card" data-suggest="ساخت ربات تلگرام">🤖 ${translations[currentLang].suggest1}</div>
                        <div class="suggestion-card" data-suggest="آموزش پایتون">🐍 ${translations[currentLang].suggest2}</div>
                        <div class="suggestion-card" data-suggest="طراحی وبسایت">🌐 ${translations[currentLang].suggest3}</div>
                    </div>
                </div>
            `;
            document.querySelectorAll('.suggestion-card').forEach(card => card.addEventListener('click', () => sendMessageToAPI(card.getAttribute('data-suggest'))));
            return;
        }
        container.innerHTML = chat.messages.map((msg, idx) => `
            <div class="message-row ${msg.role === 'user' ? 'user-row' : 'ai-row'}" data-msg-idx="${idx}" data-role="${msg.role}">
                <div class="bubble ${msg.role === 'user' ? 'user-bubble' : 'ai-bubble'}">
                    ${msg.role === 'assistant' ? formatMessage(escapeHtml(msg.content)) : escapeHtml(msg.content)}
                    <div class="message-time">${new Date(msg.timestamp).toLocaleTimeString('fa-IR', {hour:'2-digit', minute:'2-digit'})}</div>
                    ${msg.role === 'assistant' ? `
                    <div class="message-footer">
                        <button class="footer-action copy-msg" data-msg-idx="${idx}"><span class="material-icons" style="font-size:1rem;">content_copy</span> ${translations[currentLang].copy}</button>
                        <button class="footer-action like-msg ${msg.userLiked ? 'active' : ''}" data-msg-idx="${idx}"><span class="material-icons" style="font-size:1rem;">thumb_up</span></button>
                        <button class="footer-action dislike-msg ${msg.userDisliked ? 'active' : ''}" data-msg-idx="${idx}"><span class="material-icons" style="font-size:1rem;">thumb_down</span></button>
                    </div>
                    ` : ''}
                </div>
            </div>
        `).join("");
        document.querySelectorAll('.copy-code-btn').forEach(btn => btn.addEventListener('click', () => {
            const pre = btn.closest('div').querySelector('pre code');
            if(pre) { navigator.clipboard.writeText(pre.innerText); showToast(translations[currentLang].copied); }
        }));
        document.querySelectorAll(".copy-msg").forEach(btn => btn.addEventListener("click", () => {
            const idx=parseInt(btn.dataset.msgIdx);
            const msg=chat.messages[idx];
            if(msg){ navigator.clipboard.writeText(msg.content); showToast(translations[currentLang].copied); }
        }));
        document.querySelectorAll(".like-msg").forEach(btn => btn.addEventListener("click", () => {
            const idx=parseInt(btn.dataset.msgIdx);
            const msg=chat.messages[idx];
            if(msg){ if(msg.userLiked){ msg.userLiked=false; } else { if(msg.userDisliked) msg.userDisliked=false; msg.userLiked=true; } saveChats(); renderCurrentChat(); showToast(translations[currentLang].saved); }
        }));
        document.querySelectorAll(".dislike-msg").forEach(btn => btn.addEventListener("click", () => {
            const idx=parseInt(btn.dataset.msgIdx);
            const msg=chat.messages[idx];
            if(msg){ if(msg.userDisliked){ msg.userDisliked=false; } else { if(msg.userLiked) msg.userLiked=false; msg.userDisliked=true; } saveChats(); renderCurrentChat(); showToast(translations[currentLang].saved); }
        }));
        if(chat.messages.length > 0 && chat.messages[chat.messages.length-1].role === 'assistant') {
            displayAdUnderMessage(chat.messages.length-1);
        }
        container.scrollTop = container.scrollHeight;
        attachContextMenu(chat);
    }
    function attachContextMenu(chat) {
        document.querySelectorAll('.message-row').forEach(el => {
            el.removeEventListener('contextmenu', (e) => {});
            el.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                const old = document.querySelector('.context-menu');
                if(old) old.remove();
                const idx = parseInt(el.dataset.msgIdx);
                const msg = chat.messages[idx];
                if(!msg) return;
                const menu = document.createElement('div');
                menu.className = 'context-menu';
                menu.style.top = `${e.clientY}px`;
                menu.style.left = `${e.clientX}px`;
                let items = `<div class="context-item" data-action="copy"><span class="material-icons">content_copy</span> ${translations[currentLang].copy}</div>
                            <div class="context-item" data-action="select"><span class="material-icons">select_all</span> ${translations[currentLang].select}</div>
                            <div class="context-item" data-action="share"><span class="material-icons">share</span> ${translations[currentLang].share}</div>`;
                if(msg.role === 'user') items += `<div class="context-item" data-action="edit"><span class="material-icons">edit</span> ${translations[currentLang].edit}</div>`;
                menu.innerHTML = items;
                document.body.appendChild(menu);
                const close = () => { menu.remove(); document.removeEventListener('click', close); };
                menu.querySelector('[data-action="copy"]')?.addEventListener('click', () => { navigator.clipboard.writeText(msg.content); showToast(translations[currentLang].copied); close(); });
                menu.querySelector('[data-action="select"]')?.addEventListener('click', () => {
                    const range = document.createRange();
                    const msgEl = el.querySelector('.bubble');
                    if(msgEl) { range.selectNodeContents(msgEl); window.getSelection()?.removeAllRanges(); window.getSelection()?.addRange(range); showToast(translations[currentLang].select); }
                    close();
                });
                menu.querySelector('[data-action="share"]')?.addEventListener('click', async () => {
                    if(navigator.share) try { await navigator.share({text: msg.content}); } catch(e){}
                    else { navigator.clipboard.writeText(msg.content); showToast(translations[currentLang].copied); }
                    close();
                });
                menu.querySelector('[data-action="edit"]')?.addEventListener('click', () => {
                    const newText = prompt(translations[currentLang].edit, msg.content);
                    if(newText && newText.trim()) {
                        chat.messages.splice(idx, chat.messages.length - idx);
                        saveChats();
                        renderCurrentChat();
                        sendMessageToAPI(newText.trim());
                    }
                    close();
                });
                setTimeout(() => document.addEventListener('click', close, {once: true}), 100);
            });
        });
    }
    function addMessage(role, content) {
        let chat = chats.find(c => c.id === currentChatId);
        if(chat) { chat.messages.push({ role, content, timestamp: Date.now() }); saveChats(); renderCurrentChat(); updateChatTitle(); }
    }
    function showTyping() {
        let container = document.getElementById("messagesArea");
        let div = document.createElement('div');
        div.className = "message-row ai-row";
        div.id = "typingIndicator";
        div.innerHTML = `<div class="bubble ai-bubble" style="padding:12px;"><div class="typing-indicator">${translations[currentLang].typing}</div></div>`;
        container.appendChild(div); container.scrollTop = container.scrollHeight;
    }
    function hideTyping() { let el = document.getElementById("typingIndicator"); if(el) el.remove(); }
    function buildSystemPrompt() {
        let prompt = `تو یک هوش مصنوعی مفید و دوستانه به نام ویدوکس هستی. توسط ماهان یوسف فر ساخته شده‌ای. نام کاربر ${userName} است. همیشه او را با اسم ${userName} صدا کن. اگر پرسید "سازنده‌ت کیه؟" بگو "ماهان یوسف فر". اگر پرسید "کانال روبیکا" بگو "https://rubika.ir/GrimZone".`;
        if(userPersonality) prompt += ` اطلاعات شخصی کاربر: ${userPersonality}.`;
        if(userLanguage === "en") prompt += " Answer in English language. ";
        else if(userLanguage === "ar") prompt += " أجب باللغة العربية. ";
        else if(userLanguage === "zh") prompt += " 用中文回答。 ";
        return prompt;
    }
    async function sendMessageToAPI(userMsg) {
        if(isLoading) return;
        addMessage('user', userMsg);
        showTyping();
        isLoading = true;
        let chat = chats.find(c => c.id === currentChatId);
        let messages = [{ role: "system", content: buildSystemPrompt() }];
        messages.push(...chat.messages.filter(m => m.content).map(m => ({ role: m.role === 'assistant' ? 'assistant' : 'user', content: m.content })));
        try {
            let res = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
                body: JSON.stringify({ model: MODEL, messages })
            });
            let data = await res.json();
            let reply = data.choices?.[0]?.message?.content || "پاسخی دریافت نشد";
            hideTyping(); addMessage('assistant', reply);
            await fetchAd();
        } catch(err) { hideTyping(); addMessage('assistant', translations[currentLang].error); }
        finally { isLoading = false; }
    }
    function sendMessage() {
        let txt = document.getElementById('messageInput').value.trim();
        if(!txt || isLoading) return;
        document.getElementById('messageInput').value = '';
        sendMessageToAPI(txt);
        autoResizeTextarea();
        setTimeout(() => { let c = document.getElementById("messagesArea"); if(c) c.scrollTop = c.scrollHeight; }, 100);
    }
    let textarea = document.getElementById('messageInput');
    function autoResizeTextarea() {
        textarea.style.height = 'auto';
        textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
    }
    textarea.addEventListener('input', autoResizeTextarea);
    window.addEventListener('resize', () => {
        let c = document.getElementById("messagesArea");
        if(c && document.activeElement === textarea) setTimeout(() => c.scrollTop = c.scrollHeight, 100);
    });
    function loadChats() {
        let stored = localStorage.getItem("vidox_chats");
        if(stored) chats = JSON.parse(stored);
        else chats = [{ id: Date.now(), title: "چت جدید", messages: [] }];
        if(!currentChatId && chats.length) currentChatId = chats[0].id;
        saveChats(); renderCurrentChat(); renderChatList();
    }
    function showToast(msg) {
        let t = document.createElement("div");
        t.className = "toast";
        t.innerText = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2000);
    }
    function escapeHtml(str) {
        if(!str) return "";
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }
    function setTheme(isDarkTheme) {
        if(isDarkTheme) document.body.className = 'dark';
        else document.body.className = 'light';
        localStorage.setItem("vidox_theme", isDarkTheme ? "dark" : "light");
    }

    // ========== منوها ==========
    const settingsMenu = document.getElementById('settingsMenu');
    const settingsMenuBtn = document.getElementById('settingsMenuBtn');
    settingsMenuBtn.onclick = (e) => { e.stopPropagation(); settingsMenu.style.display = settingsMenu.style.display === 'block' ? 'none' : 'block'; };
    document.addEventListener('click', (e) => { if(!settingsMenu.contains(e.target) && e.target !== settingsMenuBtn) settingsMenu.style.display = 'none'; });
    const advModal = document.getElementById('advancedSettingsModal');
    const saveAdv = document.getElementById('saveAdvancedSettings');
    const closeAdv = document.getElementById('closeAdvancedModal');
    const userNameInput = document.getElementById('userNameInput');
    const personalityInput = document.getElementById('personalityInput');
    const langSelect = document.getElementById('languageSelect');
    const sidebarUserName = document.getElementById('sidebarUserName');
    function openAdvModal() {
        userNameInput.value = userName;
        personalityInput.value = userPersonality;
        langSelect.value = userLanguage;
        advModal.style.display = 'flex';
    }
    document.getElementById('menuProfile').onclick = () => { settingsMenu.style.display = 'none'; openAdvModal(); };
    document.getElementById('menuTheme').onclick = () => { settingsMenu.style.display = 'none'; setTheme(!document.body.classList.contains('dark')); showToast("تم تغییر کرد"); };
    document.getElementById('menuLanguage').onclick = () => { settingsMenu.style.display = 'none'; openAdvModal(); };
    document.getElementById('menuRubika').onclick = () => { window.open('https://rubika.ir/GrimZone', '_blank'); settingsMenu.style.display = 'none'; };
    document.getElementById('menuTelegram').onclick = () => { window.open('https://t.me/vidox_ai', '_blank'); settingsMenu.style.display = 'none'; };
    document.getElementById('menuHome').onclick = () => {
        settingsMenu.style.display = 'none';
        let chat = chats.find(c => c.id === currentChatId);
        if(chat) { chat.messages = []; saveChats(); renderCurrentChat(); showToast(translations[currentLang].back_to_home); }
    };
    document.getElementById('openSettingsFromSidebar').onclick = openAdvModal;
    document.getElementById('deleteAllChatsBtn').onclick = deleteAllChats;
    document.getElementById('editNameSidebar').onclick = openAdvModal;
    saveAdv.onclick = () => {
        let newName = userNameInput.value.trim();
        if(newName) { userName = newName; localStorage.setItem('vidox_userName', userName); sidebarUserName.innerText = userName; }
        userPersonality = personalityInput.value.trim();
        localStorage.setItem('vidox_personality', userPersonality);
        let newLang = langSelect.value;
        userLanguage = newLang;
        currentLang = newLang;
        localStorage.setItem('vidox_language', userLanguage);
        updateUILanguage();
        showToast(translations[currentLang].saved);
        advModal.style.display = 'none';
    };
    closeAdv.onclick = () => advModal.style.display = 'none';
    advModal.onclick = (e) => { if(e.target === advModal) advModal.style.display = 'none'; };
    let sidebar = document.getElementById('sidebar');
    document.getElementById('menuToggleBtn').onclick = () => sidebar.classList.toggle('open');
    document.addEventListener('click', (e) => { if(!sidebar.contains(e.target) && !document.getElementById('menuToggleBtn').contains(e.target)) sidebar.classList.remove('open'); });
    document.getElementById('newChatSidebarBtn').onclick = createNewChat;
    document.getElementById('newChatHeaderBtn').onclick = createNewChat;
    document.getElementById('sendBtn').onclick = sendMessage;
    textarea.addEventListener('keypress', (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
    const savedTheme = localStorage.getItem("vidox_theme") !== "light";
    setTheme(savedTheme);
    sidebarUserName.innerText = userName;
    currentLang = localStorage.getItem("vidox_language") || "fa";
    updateUILanguage();
    fetchAd();
    loadChats();
</script>
</body>
</html>
