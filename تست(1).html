<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>در حال بروزرسانی</title>
    <style>
        body {
            background: #1e1e2f;
            font-family: system-ui;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            text-align: center;
            margin: 0;
        }
        .container {
            padding: 20px;
        }
        .logo {
            font-size: 4rem;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 16px;
        }
        p {
            color: #a0a0b0;
            margin-bottom: 24px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            margin: 20px auto;
            border: 3px solid #3a3a4a;
            border-top-color: #f0a500;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .note {
            font-size: 0.8rem;
            color: #4a4a5a;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🔄</div>
        <h1>در حال بروزرسانی برنامه</h1>
        <p>لطفاً چند دقیقه دیگر صبر کنید...<br>نسخه جدید در حال آماده‌سازی است.</p>
        <div class="spinner"></div>
        <div class="note">ویدوکس AI | نسخه جدید به زودی</div>
    </div>
</body>
</html>
