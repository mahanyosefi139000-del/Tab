<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ماشین حساب خفن SAL</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* تم روشن (پیش‌فرض) */
        :root {
            --bg: #f5f5f5;
            --card-bg: #ffffff;
            --display-bg: #e8e8e8;
            --display-text: #1a1a1a;
            --expression-text: #555;
            --btn-bg: #ffffff;
            --btn-text: #333;
            --btn-op-bg: #f0a500;
            --btn-op-text: white;
            --btn-func-bg: #e0e0e0;
            --btn-func-text: #333;
            --shadow: rgba(0, 0, 0, 0.1);
            --border: #ddd;
        }

        body.dark {
            --bg: #121212;
            --card-bg: #1e1e1e;
            --display-bg: #2a2a2a;
            --display-text: #f0f0f0;
            --expression-text: #aaa;
            --btn-bg: #2d2d2d;
            --btn-text: #eee;
            --btn-op-bg: #f0a500;
            --btn-op-text: #121212;
            --btn-func-bg: #3a3a3a;
            --btn-func-text: #eee;
            --shadow: rgba(0, 0, 0, 0.3);
            --border: #3a3a3a;
        }

        body {
            background: var(--bg);
            font-family: 'Segoe UI', 'Poppins', 'Roboto', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
            transition: background 0.2s ease;
        }

        .calculator {
            max-width: 380px;
            width: 100%;
            background: var(--card-bg);
            border-radius: 48px;
            padding: 24px 20px 30px;
            box-shadow: 0 20px 40px var(--shadow);
            transition: all 0.2s;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding: 0 4px;
        }
        .logo {
            font-size: 18px;
            font-weight: bold;
            color: var(--btn-op-bg);
            background: var(--btn-func-bg);
            padding: 6px 14px;
            border-radius: 40px;
            font-family: monospace;
        }
        .settings-btn {
            background: var(--btn-func-bg);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.1s linear;
            color: var(--btn-text);
            box-shadow: 0 2px 5px var(--shadow);
        }
        .settings-btn:active {
            transform: scale(0.94);
        }

        .display {
            background: var(--display-bg);
            border-radius: 32px;
            padding: 20px 20px;
            margin: 16px 0 24px;
            text-align: right;
            min-height: 130px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .expression {
            font-size: 1.3rem;
            color: var(--expression-text);
            word-wrap: break-word;
            font-family: monospace;
            min-height: 32px;
        }
        .result {
            font-size: 2.4rem;
            font-weight: 700;
            color: var(--display-text);
            margin-top: 12px;
            font-family: monospace;
            letter-spacing: 1px;
            word-wrap: break-word;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 10px;
        }
        button {
            border: none;
            background: var(--btn-bg);
            padding: 18px 0;
            border-radius: 40px;
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--btn-text);
            font-family: monospace;
            cursor: pointer;
            transition: 0.05s linear;
            box-shadow: 0 2px 6px var(--shadow);
        }
        button:active {
            transform: scale(0.96);
        }
        .operator {
            background: var(--btn-op-bg);
            color: var(--btn-op-text);
            font-size: 1.7rem;
        }
        .func {
            background: var(--btn-func-bg);
            color: var(--btn-func-text);
            font-size: 1.2rem;
        }
        .equal {
            background: var(--btn-op-bg);
            color: var(--btn-op-text);
            font-size: 1.8rem;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }
        .modal-content {
            background: var(--card-bg);
            width: 85%;
            max-width: 320px;
            border-radius: 40px;
            padding: 28px 22px;
            text-align: center;
            color: var(--display-text);
            box-shadow: 0 20px 40px black;
        }
        .modal-content h3 {
            margin-bottom: 20px;
            font-size: 1.6rem;
        }
        .theme-toggle {
            display: flex;
            justify-content: space-between;
            background: var(--btn-func-bg);
            border-radius: 60px;
            padding: 6px;
            margin: 20px 0;
        }
        .theme-btn {
            flex: 1;
            background: transparent;
            box-shadow: none;
            padding: 10px;
            margin: 0 4px;
            border-radius: 40px;
            font-size: 1rem;
        }
        .theme-btn.active {
            background: var(--btn-op-bg);
            color: var(--btn-op-text);
        }
        .modal-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: var(--btn-func-bg);
            margin: 15px 0;
            padding: 12px;
            border-radius: 60px;
            text-decoration: none;
            color: var(--display-text);
            font-weight: bold;
        }
        .close-modal {
            background: var(--btn-op-bg);
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            border-radius: 40px;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }
        @media (max-width: 420px) {
            button { padding: 14px 0; font-size: 1.2rem; }
            .result { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

<div class="calculator">
    <div class="header">
        <div class="logo">⚡ SAL ⚡</div>
        <button class="settings-btn" id="settingsBtn">⚙️</button>
    </div>

    <div class="display">
        <div class="expression" id="expression"></div>
        <div class="result" id="result">0</div>
    </div>

    <div class="buttons">
        <button class="func" data-action="clear">C</button>
        <button class="func" data-action="back">⌫</button>
        <button class="func" data-action="percent">%</button>
        <button class="operator" data-op="/">÷</button>
        <button data-num="7">7</button>
        <button data-num="8">8</button>
        <button data-num="9">9</button>
        <button class="operator" data-op="*">×</button>
        <button data-num="4">4</button>
        <button data-num="5">5</button>
        <button data-num="6">6</button>
        <button class="operator" data-op="-">−</button>
        <button data-num="1">1</button>
        <button data-num="2">2</button>
        <button data-num="3">3</button>
        <button class="operator" data-op="+">+</button>
        <button data-num="0">0</button>
        <button data-num="00">00</button>
        <button data-num=".">.</button>
        <button class="equal" data-action="equal">=</button>
    </div>
</div>

<div id="settingsModal" class="modal">
    <div class="modal-content">
        <h3>⚙️ تنظیمات</h3>
        <div class="theme-toggle">
            <button class="theme-btn" id="lightThemeBtn">🌞 روز</button>
            <button class="theme-btn" id="darkThemeBtn">🌙 شب</button>
        </div>
        <a href="https://rubika.ir/GrimZone" target="_blank" class="modal-link">
            📱 کانال روبیکا
        </a>
        <button class="close-modal" id="closeModal">بستن</button>
    </div>
</div>

<script>
    // ---------- ماشین حساب ----------
    const expressionDiv = document.getElementById('expression');
    const resultDiv = document.getElementById('result');
    let currentInput = "";
    let lastResult = null;
    let justCalculated = false;

    function updateDisplay() {
        if(currentInput === "") {
            expressionDiv.innerText = "";
            if(lastResult !== null && !justCalculated) {
                resultDiv.innerText = lastResult;
            } else {
                resultDiv.innerText = "0";
            }
        } else {
            expressionDiv.innerText = currentInput;
            if(!justCalculated) resultDiv.innerText = "?";
        }
        if(justCalculated && lastResult !== null) {
            resultDiv.innerText = lastResult;
        }
    }

    function evaluateExpression(expr) {
        try {
            let processed = expr.replace(/÷/g, '/').replace(/×/g, '*');
            processed = processed.replace(/(\d+(?:\.\d+)?)%/g, (match, num) => parseFloat(num)/100);
            if(/[^0-9+\-*/%. ]/.test(processed)) throw new Error();
            const calcFunc = new Function('return (' + processed + ')');
            let result = calcFunc();
            if(isNaN(result) || !isFinite(result)) throw new Error();
            return parseFloat(result.toFixed(10));
        } catch(e) { return null; }
    }

    function calculate() {
        if(currentInput === "") {
            if(lastResult !== null) {
                currentInput = String(lastResult);
                justCalculated = false;
                updateDisplay();
            }
            return;
        }
        const res = evaluateExpression(currentInput);
        if(res !== null) {
            lastResult = res;
            resultDiv.innerText = res;
            justCalculated = true;
            updateDisplay();
        } else {
            resultDiv.innerText = "خطا";
            setTimeout(() => {
                if(!justCalculated) resultDiv.innerText = "?";
                else resultDiv.innerText = lastResult;
            }, 800);
        }
    }

    function addInput(value) {
        if(justCalculated) {
            if(/[0-9.]/.test(value)) {
                currentInput = value;
                justCalculated = false;
                lastResult = null;
            } else if(value === '+' || value === '-' || value === '*' || value === '/' || value === '÷' || value === '×') {
                if(lastResult !== null) {
                    currentInput = String(lastResult) + value;
                    justCalculated = false;
                    lastResult = null;
                } else { currentInput = value; justCalculated = false; }
            } else { currentInput = value; justCalculated = false; }
            updateDisplay();
            return;
        }
        if(value === '.') {
            let lastNumber = currentInput.split(/[\+\-\*\/÷×%]/).pop();
            if(lastNumber.includes('.')) return;
        }
        const lastChar = currentInput.slice(-1);
        const ops = ['+','-','*','/','÷','×','%'];
        if(ops.includes(lastChar) && ops.includes(value)) {
            currentInput = currentInput.slice(0, -1) + value;
        } else {
            currentInput += value;
        }
        justCalculated = false;
        updateDisplay();
    }

    function clearAll() { currentInput = ""; lastResult = null; justCalculated = false; updateDisplay(); }
    function backspace() {
        if(justCalculated) { clearAll(); return; }
        currentInput = currentInput.slice(0, -1);
        updateDisplay();
    }
    function applyPercent() {
        if(justCalculated && lastResult !== null) {
            currentInput = String(lastResult);
            justCalculated = false;
        }
        if(currentInput === "") return;
        try {
            let expr = currentInput.replace(/÷/g, '/').replace(/×/g, '*');
            let val = new Function('return (' + expr + ')')();
            if(!isNaN(val) && isFinite(val)) {
                currentInput = String(val / 100);
                updateDisplay();
            } else throw new Error();
        } catch(e) {
            const parts = currentInput.split(/[\+\-\*\/÷×]/);
            let lastNum = parts[parts.length-1];
            if(lastNum && !isNaN(parseFloat(lastNum))) {
                let percentNum = parseFloat(lastNum)/100;
                currentInput = currentInput.slice(0, -lastNum.length) + percentNum;
                updateDisplay();
            }
        }
        justCalculated = false;
    }

    document.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            if(btn.hasAttribute('data-action')) {
                const act = btn.getAttribute('data-action');
                if(act === 'clear') clearAll();
                else if(act === 'back') backspace();
                else if(act === 'equal') calculate();
                else if(act === 'percent') applyPercent();
                return;
            }
            if(btn.hasAttribute('data-num')) addInput(btn.getAttribute('data-num'));
            if(btn.hasAttribute('data-op')) addInput(btn.getAttribute('data-op'));
        });
    });

    // ---------- مودال تنظیمات و تم ----------
    const modal = document.getElementById('settingsModal');
    const settingsBtn = document.getElementById('settingsBtn');
    const closeModal = document.getElementById('closeModal');
    const lightBtn = document.getElementById('lightThemeBtn');
    const darkBtn = document.getElementById('darkThemeBtn');

    function openModal() { modal.style.display = 'flex'; }
    function closeModalFunc() { modal.style.display = 'none'; }

    settingsBtn.addEventListener('click', openModal);
    closeModal.addEventListener('click', closeModalFunc);
    modal.addEventListener('click', (e) => { if(e.target === modal) closeModalFunc(); });

    function setTheme(theme) {
        if(theme === 'dark') {
            document.body.classList.add('dark');
            localStorage.setItem('calTheme', 'dark');
            darkBtn.classList.add('active');
            lightBtn.classList.remove('active');
        } else {
            document.body.classList.remove('dark');
            localStorage.setItem('calTheme', 'light');
            lightBtn.classList.add('active');
            darkBtn.classList.remove('active');
        }
    }

    lightBtn.addEventListener('click', () => setTheme('light'));
    darkBtn.addEventListener('click', () => setTheme('dark'));

    const savedTheme = localStorage.getItem('calTheme');
    if(savedTheme === 'dark') setTheme('dark');
    else setTheme('light');
</script>
</body>
</html>
