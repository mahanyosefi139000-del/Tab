<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>بازی دوز آفلاین | با دوستان</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Google Sans', 'Roboto', sans-serif;
        }

        body.light {
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --border: #e2e8f0;
            --text: #1e293b;
            --text-soft: #64748b;
            --accent: #3b82f6;
            --input-bg: #ffffff;
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
            --cell-bg: #ffffff;
            --cell-border: #cbd5e1;
        }

        body.dark {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --border: #334155;
            --text: #f1f5f9;
            --text-soft: #94a3b8;
            --accent: #3b82f6;
            --input-bg: #334155;
            --shadow: 0 4px 12px rgba(0,0,0,0.3);
            --cell-bg: #1e293b;
            --cell-border: #475569;
        }

        body {
            background: var(--bg);
            color: var(--text);
            transition: all 0.2s;
            min-height: 100vh;
            padding: 16px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .title {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(135deg, #f5af19, #f12711);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .header-buttons {
            display: flex;
            gap: 10px;
        }
        .icon-btn {
            background: var(--card-bg);
            border: 1px solid var(--border);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 1.3rem;
            cursor: pointer;
            color: var(--text);
            box-shadow: var(--shadow);
        }

        .profile-card {
            background: var(--card-bg);
            border-radius: 32px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        .avatar-large {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            background-size: cover;
            background-position: center;
            cursor: pointer;
            font-size: 2.5rem;
        }
        .profile-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0;
        }
        .btn-sm {
            background: var(--accent);
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .btn-outline {
            background: none;
            border: 1px solid var(--border);
            color: var(--text);
        }

        .connection-card {
            background: var(--card-bg);
            border-radius: 32px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }
        .sdp-box {
            background: var(--bg);
            padding: 12px;
            border-radius: 20px;
            font-family: monospace;
            font-size: 0.7rem;
            word-break: break-all;
            margin: 10px 0;
            border: 1px solid var(--border);
        }
        .flex-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 15px;
        }

        .game-panel {
            background: var(--card-bg);
            border-radius: 40px;
            padding: 20px;
            margin-top: 20px;
            text-align: center;
            box-shadow: var(--shadow);
        }
        .turn-text {
            font-size: 1.1rem;
            margin-bottom: 15px;
        }
        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            max-width: 320px;
            margin: 0 auto 20px;
        }
        .cell {
            aspect-ratio: 1;
            background: var(--cell-bg);
            border: 2px solid var(--cell-border);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.1s;
            background-size: 55%;
            background-repeat: no-repeat;
            background-position: center;
            font-size: 2.5rem;
            font-weight: bold;
        }
        .cell.X { color: #4ecdc4; }
        .cell.O { color: #ff6b6b; }
        .cell:active { transform: scale(0.96); }
        .game-btn {
            background: var(--accent);
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            margin: 5px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: var(--card-bg);
            width: 85%;
            max-width: 350px;
            border-radius: 40px;
            padding: 28px 24px;
            text-align: center;
        }
        .theme-toggle {
            display: flex;
            gap: 12px;
            margin: 20px 0;
        }
        .theme-btn {
            flex: 1;
            padding: 10px;
            border-radius: 40px;
            background: var(--bg);
            cursor: pointer;
            border: none;
        }
        .theme-btn.active {
            background: var(--accent);
            color: white;
        }
        .modal-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: var(--bg);
            margin: 15px 0;
            padding: 12px;
            border-radius: 60px;
            text-decoration: none;
            color: var(--text);
        }
        .close-modal {
            background: var(--accent);
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            border-radius: 40px;
            border: none;
            cursor: pointer;
            color: white;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent);
            color: white;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            z-index: 1200;
            animation: fadeOut 2s forwards;
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
    </style>
</head>
<body class="dark">
<div class="container">
    <div class="header">
        <div class="title">🎮 دوز آفلاین</div>
        <div class="header-buttons">
            <button class="icon-btn" id="settingsBtn">⚙️</button>
            <button class="icon-btn" id="helpBtn">❓</button>
        </div>
    </div>

    <div id="profileSection"></div>
    <div id="connectionSection"></div>
    <div id="gameSection"></div>
</div>

<div id="settingsModal" class="modal">
    <div class="modal-content">
        <h3>⚙️ تنظیمات</h3>
        <div class="theme-toggle">
            <button class="theme-btn" id="lightThemeBtn">🌞 روز</button>
            <button class="theme-btn" id="darkThemeBtn">🌙 شب</button>
        </div>
        <a href="https://rubika.ir/GrimZone" target="_blank" class="modal-link">📱 کانال روبیکا</a>
        <div class="version-text">نسخه 2.0 | بازی دوز آفلاین</div>
        <button class="close-modal" id="closeModal">بستن</button>
    </div>
</div>

<script>
    // ========== کاربر ==========
    let currentUser = {
        id: localStorage.getItem("doz_userId") || "user_" + Math.random().toString(36).substr(2, 8),
        name: localStorage.getItem("doz_username") || "کاربر مهمان",
        avatar: localStorage.getItem("doz_avatar") || "",
        wins: parseInt(localStorage.getItem("doz_wins")) || 0,
        losses: parseInt(localStorage.getItem("doz_losses")) || 0
    };
    if (!localStorage.getItem("doz_userId")) {
        localStorage.setItem("doz_userId", currentUser.id);
        localStorage.setItem("doz_username", currentUser.name);
        localStorage.setItem("doz_wins", "0");
        localStorage.setItem("doz_losses", "0");
    }

    function saveUser() {
        localStorage.setItem("doz_username", currentUser.name);
        if (currentUser.avatar) localStorage.setItem("doz_avatar", currentUser.avatar);
        localStorage.setItem("doz_wins", currentUser.wins);
        localStorage.setItem("doz_losses", currentUser.losses);
    }

    function showToast(msg) {
        let t = document.createElement("div");
        t.className = "toast";
        t.innerText = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2000);
    }

    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }

    // ========== پروفایل ==========
    function renderProfile() {
        const container = document.getElementById("profileSection");
        container.innerHTML = `
            <div class="profile-card">
                <div class="avatar-large" id="avatarClick" style="background-image: url('${currentUser.avatar}'); background-size: cover; background-position: center;">${!currentUser.avatar ? '👤' : ''}</div>
                <div class="profile-row"><span>نام:</span><span id="profileName">${escapeHtml(currentUser.name)}</span><button class="btn-sm" id="editNameBtn">ویرایش</button></div>
                <div class="profile-row"><span>آیدی:</span><span>${currentUser.id}</span><button class="btn-sm btn-outline" id="copyIdBtn">📋 کپی</button></div>
                <div class="profile-row"><span>🏆 برد:</span><span>${currentUser.wins}</span></div>
                <div class="profile-row"><span>💔 باخت:</span><span>${currentUser.losses}</span></div>
                <div class="profile-row"><button class="btn-sm" id="changeAvatarBtn">📷 تغییر عکس</button></div>
            </div>
        `;
        document.getElementById("editNameBtn").onclick = () => {
            let newName = prompt("نام جدید:", currentUser.name);
            if (newName && newName.trim()) { currentUser.name = newName.trim(); saveUser(); renderProfile(); renderConnection(); showToast("نام تغییر کرد"); }
        };
        document.getElementById("copyIdBtn").onclick = () => { navigator.clipboard.writeText(currentUser.id); showToast("آیدی کپی شد"); };
        document.getElementById("changeAvatarBtn").onclick = () => {
            let input = document.createElement("input");
            input.type = "file";
            input.accept = "image/*";
            input.onchange = (e) => {
                let file = e.target.files[0];
                if (file) {
                    let reader = new FileReader();
                    reader.onload = (ev) => {
                        currentUser.avatar = ev.target.result;
                        saveUser();
                        renderProfile();
                        renderConnection();
                        showToast("عکس پروفایل تغییر کرد");
                    };
                    reader.readAsDataURL(file);
                }
            };
            input.click();
        };
        document.getElementById("avatarClick").onclick = () => document.getElementById("changeAvatarBtn").click();
    }

    // ========== WebRTC ==========
    let peerConnection = null;
    let dataChannel = null;
    let isHost = false;
    let opponentInfo = null;
    let mySymbol = null;
    let gameBoard = Array(9).fill(null);
    let gameActive = false;
    let currentTurn = null;

    function renderConnection() {
        const container = document.getElementById("connectionSection");
        container.innerHTML = `
            <div class="connection-card">
                <div class="flex-buttons">
                    <button class="btn-sm" id="hostBtn">🎮 میزبان (ساخت اتاق)</button>
                    <button class="btn-sm btn-outline" id="joinBtn">🔌 مهمان (پیوستن)</button>
                </div>
                <div id="sdpDisplay" style="display:none; margin-top:20px;">
                    <div>کد اتصال (برای ارسال به حریف):</div>
                    <textarea id="offerSdp" rows="4" class="sdp-box" readonly></textarea>
                    <button class="btn-sm" id="copySdpBtn">📋 کپی کد</button>
                </div>
                <div id="joinPanel" style="display:none; margin-top:20px;">
                    <div>کد دریافتی از حریف را وارد کنید:</div>
                    <textarea id="joinSdp" rows="4" class="sdp-box" placeholder="کد را در اینجا جایگذاری کنید..."></textarea>
                    <button class="btn-sm" id="doJoinBtn">🔗 اتصال</button>
                </div>
            </div>
        `;

        document.getElementById("hostBtn").onclick = () => {
            document.getElementById("sdpDisplay").style.display = "block";
            document.getElementById("joinPanel").style.display = "none";
            createOffer();
        };
        document.getElementById("joinBtn").onclick = () => {
            document.getElementById("joinPanel").style.display = "block";
            document.getElementById("sdpDisplay").style.display = "none";
        };
        document.getElementById("copySdpBtn")?.addEventListener("click", () => {
            let code = document.getElementById("offerSdp").value;
            if (code) { navigator.clipboard.writeText(code); showToast("کد کپی شد"); }
        });
        document.getElementById("doJoinBtn")?.addEventListener("click", () => joinWithSdp());
    }

    async function createOffer() {
        if (!currentUser.avatar) { showToast("لطفاً ابتدا عکس پروفایل خود را انتخاب کنید"); return; }
        const configuration = { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] };
        peerConnection = new RTCPeerConnection(configuration);
        dataChannel = peerConnection.createDataChannel("game");
        setupDataChannel();
        setupPeerConnection();

        const offer = await peerConnection.createOffer();
        await peerConnection.setLocalDescription(offer);
        const sdpBase64 = btoa(JSON.stringify(peerConnection.localDescription));
        document.getElementById("offerSdp").value = sdpBase64;
        document.getElementById("sdpDisplay").style.display = "block";
        showToast("کد اتصال ساخته شد. آن را با حریف به اشتراک بگذارید.");
        isHost = true;
    }

    async function joinWithSdp() {
        let sdpBase64 = document.getElementById("joinSdp").value.trim();
        if (!sdpBase64) { showToast("لطفاً کد دریافتی را وارد کنید"); return; }
        if (!currentUser.avatar) { showToast("لطفاً ابتدا عکس پروفایل خود را انتخاب کنید"); return; }
        let remoteDesc;
        try { remoteDesc = JSON.parse(atob(sdpBase64)); } catch(e) { showToast("کد نامعتبر است"); return; }
        const configuration = { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] };
        peerConnection = new RTCPeerConnection(configuration);
        setupPeerConnection();
        peerConnection.ondatachannel = (event) => {
            dataChannel = event.channel;
            setupDataChannel();
        };
        await peerConnection.setRemoteDescription(new RTCSessionDescription(remoteDesc));
        const answer = await peerConnection.createAnswer();
        await peerConnection.setLocalDescription(answer);
        isHost = false;
        showToast("درخواست اتصال ارسال شد. منتظر تایید حریف...");
    }

    function setupPeerConnection() {
        peerConnection.onconnectionstatechange = () => {
            if (peerConnection.connectionState === "connected") {
                showToast("اتصال برقرار شد!");
                sendMessage({ type: "profile", name: currentUser.name, avatar: currentUser.avatar, userId: currentUser.id });
            }
        };
    }

    function setupDataChannel() {
        if (!dataChannel) return;
        dataChannel.onmessage = (event) => {
            const data = JSON.parse(event.data);
            handleMessage(data);
        };
    }

    function sendMessage(msg) {
        if (dataChannel && dataChannel.readyState === "open") {
            dataChannel.send(JSON.stringify(msg));
        }
    }

    function handleMessage(msg) {
        if (msg.type === "profile") {
            opponentInfo = { name: msg.name, avatar: msg.avatar, userId: msg.userId };
            if (isHost) {
                mySymbol = 'X';
                sendMessage({ type: "role", mySymbol: 'O' });
                currentTurn = currentUser.id;
                gameActive = true;
                showToast(`بازی با ${opponentInfo.name} شروع شد. نوبت شماست ❌`);
            }
            renderGameUI();
        } else if (msg.type === "role") {
            mySymbol = (msg.mySymbol === 'X') ? 'O' : 'X';
            currentTurn = (mySymbol === 'X') ? currentUser.id : opponentInfo.userId;
            gameActive = true;
            showToast(`شما ${mySymbol === 'X' ? '❌' : '⭕'} هستید. نوبت ${currentTurn === currentUser.id ? "شما" : "حریف"}`);
            renderGameUI();
        } else if (msg.type === "move") {
            let idx = msg.index;
            if (gameActive && currentTurn === msg.playerId && gameBoard[idx] === null) {
                gameBoard[idx] = (msg.symbol === 'X') ? 'X' : 'O';
                currentTurn = (currentTurn === currentUser.id) ? opponentInfo.userId : currentUser.id;
                renderGameUI();
                checkWinner();
            }
        }
    }

    function sendMove(index) {
        if (!gameActive) return;
        if (currentTurn !== currentUser.id) { showToast("نوبت شما نیست"); return; }
        if (gameBoard[index] !== null) return;
        gameBoard[index] = mySymbol;
        sendMessage({ type: "move", index: index, symbol: mySymbol, playerId: currentUser.id });
        currentTurn = opponentInfo.userId;
        renderGameUI();
        checkWinner();
    }

    function checkWinner() {
        const patterns = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
        for (let p of patterns) {
            if (gameBoard[p[0]] && gameBoard[p[0]] === gameBoard[p[1]] && gameBoard[p[0]] === gameBoard[p[2]]) {
                gameActive = false;
                if (gameBoard[p[0]] === mySymbol) {
                    currentUser.wins++; saveUser(); showToast("🎉 شما برنده شدید!");
                } else {
                    currentUser.losses++; saveUser(); showToast("😢 حریف برنده شد");
                }
                renderProfile();
                renderGameUI();
                return;
            }
        }
        if (gameBoard.every(c => c !== null)) {
            gameActive = false;
            showToast("🤝 مساوی!");
            renderGameUI();
        }
    }

    function renderGameUI() {
        const container = document.getElementById("gameSection");
        if (!gameActive || !opponentInfo) {
            container.innerHTML = `<div class="game-panel">${opponentInfo ? "در انتظار شروع بازی..." : "ابتدا اتصال برقرار کن"}</div>`;
            return;
        }
        let isMyTurn = (currentTurn === currentUser.id);
        container.innerHTML = `
            <div class="game-panel">
                <div class="turn-text">${isMyTurn ? "⭐ نوبت شماست" : "⏳ نوبت " + opponentInfo.name}</div>
                <div class="board" id="gameBoard"></div>
            </div>
        `;
        const boardDiv = document.getElementById("gameBoard");
        for (let i = 0; i < 9; i++) {
            let cell = document.createElement("div");
            cell.className = "cell";
            let val = gameBoard[i];
            if (val === 'X') cell.textContent = '❌';
            else if (val === 'O') cell.textContent = '⭕';
            cell.onclick = () => sendMove(i);
            boardDiv.appendChild(cell);
        }
    }

    // ========== تنظیمات ==========
    const modal = document.getElementById("settingsModal");
    const settingsBtn = document.getElementById("settingsBtn");
    const closeModal = document.getElementById("closeModal");
    const lightBtn = document.getElementById("lightThemeBtn");
    const darkBtn = document.getElementById("darkThemeBtn");
    const helpBtn = document.getElementById("helpBtn");

    function setTheme(theme) {
        document.body.className = theme;
        localStorage.setItem("doz_theme", theme);
        if (theme === 'dark') { darkBtn.classList.add("active"); lightBtn.classList.remove("active"); }
        else { lightBtn.classList.add("active"); darkBtn.classList.remove("active"); }
    }

    settingsBtn.onclick = () => modal.style.display = "flex";
    closeModal.onclick = () => modal.style.display = "none";
    modal.onclick = (e) => { if (e.target === modal) modal.style.display = "none"; };
    lightBtn.onclick = () => setTheme("light");
    darkBtn.onclick = () => setTheme("dark");
    helpBtn.onclick = () => {
        alert("🎮 راهنمای بازی:\n1. هر دو نفر عکس پروفایل انتخاب کنید.\n2. یک نفر \"میزبان\" را بزند و کد را برای دوستش بفرستد.\n3. نفر دوم \"مهمان\" را بزند و کد را جایگذاری کند.\n4. بازی شروع می‌شود.");
    };

    const savedTheme = localStorage.getItem("doz_theme") || "dark";
    setTheme(savedTheme);
    renderProfile();
    renderConnection();
    renderGameUI();
</script>
</body>
</html>
